<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Il Messaggero Medievale</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a130e;
            font-family: 'Georgia', serif;
            color: #f4edd2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #2c251e;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Schermata di Creazione Personaggio */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #3e3126 0%, #16100b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        .menu-title {
            font-size: 28px;
            color: #d4af37;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #c5b39a;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #8b5a2b;
            background: #f4edd2;
            color: #1a130e;
            border-radius: 6px;
            text-align: center;
            font-family: inherit;
        }
        .color-picker {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .color-btn.selected {
            border: 3px solid #d4af37;
            transform: scale(1.15);
        }
        #start-btn {
            margin-top: 20px;
            padding: 12px 35px;
            font-size: 18px;
            background: #8b5a2b;
            color: #f4edd2;
            border: 2px solid #d4af37;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #start-btn:hover { background: #d4af37; color: #1a130e; }

        /* Overlay UI di Gioco */
        #ui-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 15px;
            z-index: 10;
        }
        .hud-card {
            background: rgba(36, 29, 23, 0.85);
            padding: 10px 15px;
            border: 1px solid #8b5a2b;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 80%;
            float: left;
        }
        #gold-display {
            float: right;
            font-weight: bold;
            color: #d4af37;
        }

        /* Box dei Dialoghi */
        #dialogue-box {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(22, 16, 12, 0.95);
            border: 2px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            z-index: 20;
        }
        #dialogue-text { margin: 0; font-size: 15px; line-height: 1.5; color: #f4edd2; }
        #dialogue-prompt { text-align: right; font-size: 11px; color: #d4af37; margin-top: 8px; animation: blink 1.2s infinite; }
        
        /* Pulsante d'azione virtuale per Mobile */
        #action-btn {
            display: none;
            position: absolute;
            right: 25px;
            bottom: 120px;
            width: 65px;
            height: 65px;
            background: #8b5a2b;
            border: 3px solid #d4af37;
            border-radius: 50%;
            color: #f4edd2;
            font-size: 14px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: inherit;
            z-index: 30;
        }
        #action-btn:active { background: #d4af37; color: #1a130e; transform: scale(0.95); }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Menu di Creazione Personaggio -->
    <div id="menu-screen">
        <div class="menu-title">📜 Il Messaggero Medievale</div>
        <div class="form-group">
            <label>Nome del Viandante:</label>
            <input type="text" id="player-name" value="Gaspare" maxlength="12">
        </div>
        <div class="form-group">
            <label>Colore del Mantello:</label>
            <div class="color-picker">
                <div class="color-btn selected" style="background: #a22c2c;" data-color="#a22c2c"></div>
                <div class="color-btn" style="background: #345c85;" data-color="#345c85"></div>
                <div class="color-btn" style="background: #2a6f43;" data-color="#2a6f43"></div>
                <div class="color-btn" style="background: #b8860b;" data-color="#b8860b"></div>
            </div>
        </div>
        <button id="start-btn">Inizia il Viaggio</button>
    </div>

    <!-- Area di disegno principale -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Overlay e Controlli -->
    <div id="ui-overlay">
        <div class="hud-card" id="quest-status">Incarico: Esplora il villaggio e parla con la gente.</div>
        <div class="hud-card" id="gold-display">💰 0 Monete</div>
        <button id="action-btn">PARLA</button>
    </div>

    <!-- Finestra di Dialogo -->
    <div id="dialogue-box">
        <p id="dialogue-text"></p>
        <div id="dialogue-prompt">Tocca lo schermo o premi [Spazio/E] per continuare</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Variabili di Stato Globali
    let gameActive = false;
    let worldWidth = 2600; 
    let gold = 0;
    let activeQuest = null;
    let camX = 0;
    let groundY = 0;

    // Configurazione Giocatore
    const player = {
        name: "Gaspare",
        cloak: "#a22c2c",
        x: 150,
        y: 0,
        targetX: 150,
        speed: 4.5,
        width: 22,
        height: 45,
        walkTimer: 0,
        isMoving: false
    };

    // Strutture e Case del panorama (Stile Abeto)
    const buildings = [
        { name: "Tettoia del Sarto", x: 250, w: 110, h: 90, color: "#7a5c43", roof: "#9c7c5d" },
        { name: "La Locanda del Cinghiale", x: 1050, w: 240, h: 170, color: "#8b5a2b", roof: "#5c3a21" },
        { name: "Maniero dei Medici", x: 1950, w: 280, h: 240, color: "#616f7d", roof: "#3a4454" }
    ];

    // Popolazione del regno (NPC)
    const npcs = [
        { 
            id: "contadino", name: "Bernardo il Tessitore", x: 400, color: "#544338", detail: "#8b7355", ceto: "Povero",
            dialogue: "Salute messaggero! Il Locandiere aspetta questa 'Sacchetta di Sementi'. Puoi portargliela tu? Non reggo un passo oggi.",
            quest: { item: "Sacchetta di Sementi", target: "locandiere", text: "Porta le sementi alla Locanda del Cinghiale." }
        },
        { 
            id: "locandiere", name: "Mastro Giovanni", x: 1200, color: "#7c4224", detail: "#b8860b", ceto: "Borghese",
            dialogue: "Benvenuto viandante! Se cerchi lavoro, chiedi a Bernardo o alla Contessa Beatrice.",
            completeDialogue: "Ah! Le mie sementi. Ottimo lavoro ragazzo, prendi queste monete per la consegna!",
            questReward: 20
        },
        { 
            id: "nobile", name: "Contessa Beatrice", x: 2100, color: "#4b2857", detail: "#d4af37", ceto: "Nobile",
            dialogue: "Tu! Corriere! Prendi subito questo 'Involto Sigillato' e portalo a Bernardo alla periferia. Muoviti, contiene documenti urgenti.",
            quest: { item: "Involto Sigillato", target: "contadino", text: "Consegna l'involto sigillato a Bernardo il Tessitore." }
        }
    ];

    let currentNpcDialogue = null;
    const keys = {};

    // Adattamento Finestra Responsiva immediato
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height * 0.75; 
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Calcola le misure subito all'avvio della pagina

    // Configurazione globale dei controlli (Sempre attivi in background)
    function initInput() {
        const handlePointer = (clientX) => {
            if (!gameActive) return;
            if (currentNpcDialogue) {
                closeDialogue();
                return;
            }
            player.targetX = clientX + camX;
        };

        // Click / Touch sullo schermo per muoversi
        window.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            if (e.target.tagName !== 'BUTTON' && !document.getElementById('dialogue-box').contains(e.target)) {
                handlePointer(e.clientX);
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            if (e.target.tagName !== 'BUTTON' && !document.getElementById('dialogue-box').contains(e.target)) {
                handlePointer(e.touches[0].clientX);
            }
        });

        // Tastiera (PC)
        window.addEventListener('keydown', (e) => { 
            if (!gameActive) return;
            keys[e.code] = true; 
            if (e.code === 'Space' || e.code === 'KeyE') triggerInteraction();
        });
        window.addEventListener('keyup', (e) => { if (gameActive) keys[e.code] = false; });

        // Pulsante virtuale PARLA (Mobile)
        document.getElementById('action-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            triggerInteraction();
        });
        
        // Cliccare sul box di dialogo lo chiude
        document.getElementById('dialogue-box').addEventListener('click', () => {
            closeDialogue();
        });

        // Selezione colore abito nel menu
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                player.cloak = btn.dataset.color;
            });
        });
    }
    initInput();

    // Avvio del gioco dal Menu
    document.getElementById('start-btn').addEventListener('click', () => {
        const nameVal = document.getElementById('player-name').value.trim();
        if (nameVal) player.name = nameVal;

        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'block';
        
        gameActive = true;
        resizeCanvas();
        player.x = 150;
        player.targetX = 150;
        
        requestAnimationFrame(gameLoop);
    });

    // Logica di Interazione NPC / Quest
    function triggerInteraction() {
        if (currentNpcDialogue) {
            closeDialogue();
            return;
        }

        const nearNpc = npcs.find(npc => Math.abs(player.x - npc.x) < 55);
        if (nearNpc) {
            currentNpcDialogue = nearNpc;
            let msg = nearNpc.dialogue;

            if (activeQuest && activeQuest.target === nearNpc.id) {
                msg = nearNpc.completeDialogue || "Perfetto, ti ringrazio immensamente!";
            } else if (activeQuest && activeQuest.target !== nearNpc.id) {
                msg = `Benvenuto ${player.name}, vedo che hai già un'altra consegna da sbrigare.`;
            }

            document.getElementById('dialogue-text').innerHTML = `<strong>${nearNpc.name}</strong> <small>(${nearNpc.ceto})</small><br>"${msg}"`;
            document.getElementById('dialogue-box').style.display = 'block';
        }
    }

    function closeDialogue() {
        if (!currentNpcDialogue) return;
        
        const npc = currentNpcDialogue;
        document.getElementById('dialogue-box').style.display = 'none';
        currentNpcDialogue = null;

        if (activeQuest && activeQuest.target === npc.id) {
            gold += npc.questReward || 15;
            document.getElementById('gold-display').innerText = `💰 ${gold} Monete`;
            activeQuest = null;
            document.getElementById('quest-status').innerText = "Incarico: Esplora il villaggio e parla con la gente.";
        } else if (!activeQuest && npc.quest) {
            activeQuest = npc.quest;
            document.getElementById('quest-status').innerText = `Incarico: ${activeQuest.text} [${activeQuest.item}]`;
        }
    }

    // Aggiornamento posizioni e fisica
    function update() {
        if (currentNpcDialogue) {
            player.isMoving = false;
            return;
        }

        if (keys['ArrowRight'] || keys['KeyD']) player.targetX += player.speed;
        if (keys['ArrowLeft'] || keys['KeyA']) player.targetX -= player.speed;

        if (player.targetX < 40) player.targetX = 40;
        if (player.targetX > worldWidth - 40) player.targetX = worldWidth - 40;

        // Movimento ad interpolazione (Inerzia fluida stile Abeto)
        let dx = player.targetX - player.x;
        if (Math.abs(dx) > 0.5) {
            player.x += dx * 0.12; 
            player.isMoving = true;
            player.walkTimer += 0.15;
        } else {
            player.x = player.targetX;
            player.isMoving = false;
        }

        // Telecamera d'inseguimento morbida
        let targetCamX = player.x - canvas.width / 2;
        camX += (targetCamX - camX) * 0.1;
        if (camX < 0) camX = 0;
        if (camX > worldWidth - canvas.width) camX = worldWidth - canvas.width;

        // Mostra pulsante "PARLA" solo se vicino a NPC
        const nearAnyNpc = npcs.some(npc => Math.abs(player.x - npc.x) < 55);
        document.getElementById('action-btn').style.display = nearAnyNpc ? 'flex' : 'none';
    }

    // Rendering su Canvas
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Cielo Gradiente
        let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, '#ebd9c8');
        skyGrad.addColorStop(0.6, '#dfc5b0');
        skyGrad.addColorStop(1, '#cca993');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Sfondo Parallasse (Montagne)
        ctx.save();
        ctx.translate(-camX * 0.25, 0);
        ctx.fillStyle = '#bfa593';
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        for (let i = 0; i <= worldWidth + 400; i += 300) {
            ctx.lineTo(i, groundY - 140 - (Math.sin(i * 0.01) * 30));
            ctx.lineTo(i + 150, groundY - 180 - (Math.cos(i * 0.005) * 40));
        }
        ctx.lineTo(worldWidth + 600, groundY);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Elementi di Gioco (Mappa reale)
        ctx.save();
        ctx.translate(-camX, 0);

        // Terreno
        ctx.fillStyle = '#8fa874'; 
        ctx.fillRect(0, groundY, worldWidth, canvas.height - groundY);
        ctx.fillStyle = '#738a59'; 
        ctx.fillRect(0, groundY, worldWidth, 8);

        // Edifici
        buildings.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
            ctx.fillStyle = b.roof;
            ctx.beginPath();
            ctx.moveTo(b.x - 15, groundY - b.h);
            ctx.lineTo(b.x + b.w / 2, groundY - b.h - 45);
            ctx.lineTo(b.x + b.w + 15, groundY - b.h);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#423225';
            ctx.fillRect(b.x + b.w / 2 - 15, groundY - 50, 30, 50);
            ctx.fillStyle = '#241a12';
            ctx.font = 'italic bold 13px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(b.name, b.x + b.w / 2, groundY - b.h + 25);
        });

        // Popolazione NPC
        npcs.forEach(npc => {
            ctx.fillStyle = npc.color;
            ctx.beginPath();
            ctx.moveTo(npc.x, groundY);
            ctx.lineTo(npc.x - 14, groundY);
            ctx.lineTo(npc.x, groundY - 45);
            ctx.lineTo(npc.x + 14, groundY);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = npc.detail;
            ctx.fillRect(npc.x - 4, groundY - 25, 8, 25);

            ctx.fillStyle = '#fce3cd';
            ctx.beginPath();
            ctx.arc(npc.x, groundY - 50, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#241a12';
            ctx.font = '11px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(npc.name, npc.x, groundY - 70);

            // Icona Quest Fluttuante
            if (activeQuest && activeQuest.target === npc.id) {
                ctx.fillStyle = '#cc3333';
                ctx.font = 'bold 20px Georgia';
                ctx.fillText("?", npc.x, groundY - 85 + Math.sin(Date.now() * 0.005) * 3);
            } else if (!activeQuest && npc.quest) {
                ctx.fillStyle = '#d4af37';
                ctx.font = 'bold 20px Georgia';
                ctx.fillText("!", npc.x, groundY - 85 + Math.sin(Date.now() * 0.005) * 3);
            }
        });

        // Giocatore (Il Messaggero)
        let bobbingY = player.isMoving ? Math.sin(player.walkTimer) * 3 : 0;
        let pCurY = groundY + bobbingY;

        ctx.fillStyle = '#222';
        ctx.fillRect(player.x - 7, pCurY - 15, 14, 15);

        ctx.fillStyle = player.cloak;
        ctx.beginPath();
        ctx.moveTo(player.x, pCurY - player.height + 12);
        ctx.lineTo(player.x - 14, pCurY - 4);
        ctx.lineTo(player.x + 14, pCurY - 4);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#fce3cd';
        ctx.beginPath();
        ctx.arc(player.x, pCurY - player.height + 10, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = player.cloak;
        ctx.beginPath();
        ctx.arc(player.x, pCurY - player.height + 8, 9, Math.PI, 0);
        ctx.fill();

        if (activeQuest) {
            ctx.fillStyle = '#5c3a21';
            ctx.fillRect(player.x - 12, pCurY - 24, 8, 9);
        }

        ctx.fillStyle = '#241a12';
        ctx.font = 'bold 12px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(player.name, player.x, pCurY - player.height - 10);

        ctx.restore();
    }

    // Ciclo di gioco principale
    function gameLoop() {
        if (!gameActive) return;
